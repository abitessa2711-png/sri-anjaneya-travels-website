<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Car Body Gradients -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
    
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="400" cy="380" rx="310" ry="22" fill="#000000" opacity="0.6" />
  
  <!-- Car Group -->
  <g filter="url(#dropShadow)">
    <!-- Car Body Silhouette (Hatchback profile) -->
    <!-- Lower Body -->
    <path d="M140 340 L135 305 C135 290 150 270 175 270 L230 270 C250 225 285 175 350 165 L570 165 C605 165 635 185 660 225 L730 295 C755 315 745 340 715 340 L670 340 A 55 55 0 0 0 560 340 L285 340 A 55 55 0 0 0 175 340 Z" fill="url(#bodyGrad)" />

    <!-- Roof & Pillars -->
    <path d="M340 167 L560 167 C590 167 615 185 630 215 L665 260 L300 260 Z" fill="#0a0f1d" />

    <!-- Windows -->
    <path d="M350 175 L450 175 L450 250 L320 250 Z" fill="url(#windowGrad)" opacity="0.9" />
    <path d="M465 175 L555 175 L585 250 L465 250 Z" fill="url(#windowGrad)" opacity="0.9" />
    <path d="M570 175 L615 175 L635 250 L585 250 Z" fill="url(#windowGrad)" opacity="0.7" />

    <!-- Windshield Divider Lines -->
    <line x1="458" y1="167" x2="458" y2="260" stroke="#475569" stroke-width="5" />
    <line x1="562" y1="167" x2="562" y2="260" stroke="#475569" stroke-width="5" />

    <!-- Headlights & Grill details -->
    <path d="M685 245 L725 250 L715 270 L675 260 Z" fill="#f8fafc" />
    <path d="M700 250 L720 253 L713 265 L695 260 Z" fill="#60a5fa" />
    <path d="M135 298 L155 296 L158 312 L137 314 Z" fill="#dc2626" /> <!-- Taillight -->

    <!-- Door Handles -->
    <rect x="330" y="270" width="28" height="6" rx="3" fill="#3b82f6" stroke="#ffffff" stroke-width="1" />
    <rect x="510" y="270" width="28" height="6" rx="3" fill="#3b82f6" stroke="#ffffff" stroke-width="1" />

    <!-- Character Lines -->
    <path d="M220 295 Q420 310 670 280" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.5" />

    <!-- Front Wheel Arch and Wheel -->
    <circle cx="230" cy="340" r="58" fill="#090d16" />
    <circle cx="230" cy="340" r="46" fill="url(#wheelGrad)" />
    <circle cx="230" cy="340" r="24" fill="#cbd5e1" />
    <circle cx="230" cy="340" r="6" fill="#1e293b" />
    <line x1="230" y1="294" x2="230" y2="386" stroke="#ffffff" stroke-width="3" />
    <line x1="184" y1="340" x2="276" y2="340" stroke="#ffffff" stroke-width="3" />
    <line x1="197" y1="307" x2="263" y2="373" stroke="#ffffff" stroke-width="3" />
    <line x1="197" y1="373" x2="263" y2="307" stroke="#ffffff" stroke-width="3" />

    <!-- Rear Wheel Arch and Wheel -->
    <circle cx="615" cy="340" r="58" fill="#090d16" />
    <circle cx="615" cy="340" r="46" fill="url(#wheelGrad)" />
    <circle cx="615" cy="340" r="24" fill="#cbd5e1" />
    <circle cx="615" cy="340" r="6" fill="#1e293b" />
    <line x1="615" y1="294" x2="615" y2="386" stroke="#ffffff" stroke-width="3" />
    <line x1="569" y1="340" x2="661" y2="340" stroke="#ffffff" stroke-width="3" />
    <line x1="582" y1="307" x2="648" y2="373" stroke="#ffffff" stroke-width="3" />
    <line x1="582" y1="373" x2="648" y2="307" stroke="#ffffff" stroke-width="3" />
  </g>

  <!-- Text Badge -->
  <text x="400" y="420" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle" letter-spacing="4">MARUTI SUZUKI BALENO</text>
</svg>
